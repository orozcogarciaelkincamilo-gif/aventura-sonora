<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aventura sonora</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #140b06;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      padding-left: max(10px, env(safe-area-inset-left));
      padding-right: max(10px, env(safe-area-inset-right));
      padding-top: max(10px, env(safe-area-inset-top));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    @media (min-width: 768px) {
      .app {
        width: min(56.25vh, 430px);
        height: min(100vh, 860px);
        border-radius: 22px;
        box-shadow: 0 0 30px rgba(0,0,0,0.45);
      }
    }

    .pantalla {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
    }

    .pantalla.activa {
      opacity: 1;
      pointer-events: auto;
    }

    .fondo1, .fondo2 {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .fondo1 {
      animation: zoomSuave 14s ease-in-out infinite alternate;
    }

    .capa-oscura {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.18),
        rgba(0,0,0,0.05),
        rgba(0,0,0,0.22)
      );
      z-index: 2;
      pointer-events: none;
    }

    .boton {
      position: absolute;
      left: 50%;
      top: 78%;
      transform: translate(-50%, -50%);
      width: 82%;
      max-width: 320px;
      padding: 18px 26px;
      border: none;
      border-radius: 40px;
      font-size: 22px;
      font-weight: bold;
      color: #fffce8;
      background: linear-gradient(180deg, #9cec63 0%, #40c463 45%, #159a7b 100%);
      box-shadow:
        0 0 12px rgba(255, 239, 140, 0.7),
        0 0 24px rgba(73, 255, 170, 0.45),
        0 8px 18px rgba(0, 0, 0, 0.35);
      cursor: pointer;
      animation: palpitar 1.6s ease-in-out infinite;
      z-index: 8;
      -webkit-tap-highlight-color: transparent;
    }

    .mensaje {
      position: absolute;
      left: 50%;
      top: 69%;
      transform: translateX(-50%);
      width: 82%;
      max-width: 320px;
      text-align: center;
      color: rgba(255,255,255,0.96);
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.8s ease;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      z-index: 7;
      pointer-events: none;
    }

    .mensaje.visible {
      opacity: 1;
    }

    .transicion {
      position: absolute;
      inset: 0;
      opacity: 0;
      z-index: 40;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(140, 90, 170, 0.35), rgba(0, 0, 0, 0.95) 60%),
        rgba(0, 0, 0, 0.95);
    }

    .transicion.activa {
      animation: transicionMisteriosa 1.8s ease forwards;
    }

    .cuadro-texto {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 72%;
      max-width: 320px;
      background: linear-gradient(
        180deg,
        rgba(255, 249, 231, 0.96) 0%,
        rgba(250, 239, 210, 0.95) 100%
      );
      border-radius: 18px;
      padding: 12px 13px 11px;
      border: 2px solid rgba(212, 163, 115, 0.8);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.28),
        0 0 14px rgba(255, 220, 140, 0.18);
      backdrop-filter: blur(2px);
      z-index: 20;
      transform-origin: top center;
      animation:
        desenrollarPergamino 1s ease,
        flotarPergamino 4.2s ease-in-out infinite 1s,
        brilloSuave 3s ease-in-out infinite 1s;
    }

    .cuadro-texto::before,
    .cuadro-texto::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      top: -6px;
      border-radius: 50%;
      background: linear-gradient(180deg, #d4a373, #b57d4d);
      box-shadow: inset 0 0 4px rgba(255,255,255,0.3);
      opacity: 0.9;
    }

    .cuadro-texto::before {
      left: 12px;
    }

    .cuadro-texto::after {
      right: 12px;
    }

    .cuadro-texto h2 {
      margin: 0 0 6px 0;
      font-size: 16px;
      color: #a86318;
      font-weight: normal;
      letter-spacing: 0.3px;
      text-align: center;
    }

    .cuadro-texto p {
      margin: 0;
      font-size: 12.5px;
      line-height: 1.32;
      color: #1f1f1f;
      min-height: 112px;
      text-align: justify;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      animation: parpadear 0.8s infinite;
    }

    .chispa-pergamino {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,245,180,1) 0%, rgba(255,210,120,0.9) 55%, rgba(255,210,120,0) 100%);
      pointer-events: none;
      z-index: 21;
      animation: chispaFlota 3.8s ease-in-out infinite;
      opacity: 0;
    }

    .cp1 { left: 18%; top: 11%; animation-delay: 0s; }
    .cp2 { left: 78%; top: 12%; animation-delay: 0.6s; }
    .cp3 { left: 14%; top: 23%; animation-delay: 1.2s; }
    .cp4 { left: 82%; top: 24%; animation-delay: 1.8s; }
    .cp5 { left: 50%; top: 9%;  animation-delay: 2.2s; }

    .nota {
      position: absolute;
      font-size: 38px;
      color: #ffbb33;
      text-shadow:
        0 0 8px rgba(255, 180, 70, 0.9),
        0 0 18px rgba(255, 140, 0, 0.7),
        0 0 28px rgba(255, 215, 120, 0.5);
      animation: moverNota 3.2s ease-in-out infinite;
      pointer-events: none;
      z-index: 12;
    }

    .nota.n1 { left: 7%; top: 52%; animation-delay: 0s; }
    .nota.n2 { right: 8%; top: 28%; animation-delay: 0.8s; }
    .nota.n3 { left: 10%; top: 75%; animation-delay: 1.5s; }
    .nota.n4 { right: 9%; top: 74%; animation-delay: 0.4s; }
    .nota.n5 { right: 11%; top: 51%; animation-delay: 1.1s; }
    .nota.n6 { left: 14%; top: 33%; animation-delay: 0.6s; }
    .nota.n7 { right: 13%; top: 62%; animation-delay: 1.8s; }

    .luz {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      filter: blur(1px);
      animation-name: flotar;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      z-index: 5;
    }

    .piedra {
      position: absolute;
      width: 88px;
      height: 40px;
      border-radius: 50%;
      border: 5px solid rgba(210, 190, 45, 0.75);
      background: rgba(255, 255, 255, 0.02);
      box-shadow:
        0 0 8px rgba(210, 190, 45, 0.25),
        inset 0 0 4px rgba(255, 235, 120, 0.08);
      cursor: pointer;
      z-index: 26;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      animation: respiracionAro 2.6s ease-in-out infinite;
    }

    .piedra:hover,
    .piedra:active,
    .piedra.activa {
      transform: scale(1.05);
      border-color: rgba(235, 215, 70, 0.95);
      box-shadow:
        0 0 12px rgba(235, 215, 70, 0.4),
        inset 0 0 6px rgba(255, 240, 150, 0.14);
    }

    .piedra.tocada {
      border-color: rgba(140, 255, 165, 0.95);
      box-shadow:
        0 0 14px rgba(120, 255, 170, 0.45),
        inset 0 0 8px rgba(180, 255, 220, 0.18);
      background: rgba(180, 255, 220, 0.05);
    }

    .piedra:focus {
      outline: none;
    }

    .chispa {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 3px solid rgba(255, 225, 120, 0.9);
      box-shadow: 0 0 16px rgba(255, 210, 90, 0.55);
      pointer-events: none;
      z-index: 35;
      transform: translate(-50%, -50%) scale(0.3);
      opacity: 0;
    }

    .chispa.activa {
      animation: ondaMagica 0.65s ease-out forwards;
    }

    /* No moví las piedras */
    .p1  { left: 72%; top: 93%; }
    .p2  { left: 5%;  top: 87%; }
    .p3  { left: 54%; top: 75%; }
    .p4  { left: 14%; top: 66%; }
    .p5  { left: 47%; top: 59%; }
    .p6  { left: 31%; top: 52%; }
    .p7  { left: 50%; top: 45%; }
    .p8  { left: 28%; top: 41%; }
    .p9  { left: 53%; top: 38%; }
    .p10 { left: 36%; top: 35%; }

    .palabra-actual {
      position: absolute;
      left: 50%;
      bottom: 4%;
      transform: translateX(-50%);
      min-width: 180px;
      max-width: 78%;
      text-align: center;
      padding: 10px 16px;
      border-radius: 18px;
      background: rgba(255, 248, 235, 0.94);
      color: #8a4f10;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 6px 14px rgba(0,0,0,0.28);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      z-index: 27;
    }

    .palabra-actual.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .progreso {
      position: absolute;
      left: calc(4% + env(safe-area-inset-left));
      bottom: calc(45% + env(safe-area-inset-bottom));
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(255, 248, 235, 0.9);
      color: #8a4f10;
      font-size: 14px;
      font-weight: bold;
      z-index: 28;
      box-shadow: 0 6px 14px rgba(0,0,0,0.22);
    }

    .acciones {
      position: absolute;
      right: calc(6% + env(safe-area-inset-right));
      top: 36%;
      z-index: 29;
    }

    .accion-btn {
      border: none;
      border-radius: 14px;
      padding: 7px 10px;
      background: rgba(255, 248, 235, 0.92);
      color: #8a4f10;
      font-size: 11px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
      cursor: pointer;
      min-width: 95px;
    }

    .final {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.45);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .final.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .final-card {
      width: 84%;
      max-width: 340px;
      padding: 16px;
      border-radius: 24px;
      text-align: center;
      background: rgba(255, 246, 228, 0.97);
      box-shadow: 0 12px 24px rgba(0,0,0,0.3);
      border: 2px solid rgba(255,255,255,0.5);
      animation: aparecerFinal 0.5s ease;
    }

    .final-imagen {
      width: 100%;
      border-radius: 18px;
      display: block;
      margin-bottom: 14px;
    }

    .final-card h3 {
      margin: 0 0 10px;
      color: #9a5a12;
      font-size: 24px;
    }

    .final-card p {
      margin: 0;
      color: #4b341f;
      line-height: 1.4;
      font-size: 15px;
    }

    .final-acciones {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .final-card button {
      border: none;
      border-radius: 16px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: bold;
      background: linear-gradient(180deg, #9cec63 0%, #40c463 45%, #159a7b 100%);
      color: white;
      cursor: pointer;
    }

    @keyframes zoomSuave {
      0% { transform: scale(1); }
      100% { transform: scale(1.08); }
    }

    @keyframes palpitar {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.08); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes flotar {
      0% {
        transform: translateY(20px) translateX(0px) scale(0.8);
        opacity: 0;
      }
      20% { opacity: 0.9; }
      50% {
        transform: translateY(-80px) translateX(10px) scale(1);
        opacity: 0.8;
      }
      100% {
        transform: translateY(-180px) translateX(-12px) scale(0.7);
        opacity: 0;
      }
    }

    @keyframes transicionMisteriosa {
      0% { opacity: 0; transform: scale(1); }
      25% { opacity: 0.65; }
      55% { opacity: 1; transform: scale(1.03); }
      100% { opacity: 0; transform: scale(1.08); }
    }

    @keyframes moverNota {
      0% { transform: translateY(0) scale(1) rotate(0deg); }
      25% { transform: translateY(-10px) scale(1.06) rotate(-4deg); }
      50% { transform: translateY(-18px) scale(1.1) rotate(3deg); }
      75% { transform: translateY(-8px) scale(1.04) rotate(-2deg); }
      100% { transform: translateY(0) scale(1) rotate(0deg); }
    }

    @keyframes parpadear {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes respiracionAro {
      0%, 100% {
        box-shadow:
          0 0 8px rgba(210, 190, 45, 0.2),
          inset 0 0 4px rgba(255, 235, 120, 0.06);
      }
      50% {
        box-shadow:
          0 0 12px rgba(235, 215, 70, 0.34),
          inset 0 0 5px rgba(255, 240, 150, 0.1);
      }
    }

    @keyframes ondaMagica {
      0% {
        transform: translate(-50%, -50%) scale(0.3);
        opacity: 0.9;
      }
      100% {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
      }
    }

    @keyframes aparecerFinal {
      0% {
        transform: scale(0.85);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes desenrollarPergamino {
      0% {
        opacity: 0;
        transform: translateX(-50%) scaleY(0.08) scaleX(0.92);
        filter: blur(2px);
      }
      55% {
        opacity: 1;
        transform: translateX(-50%) scaleY(1.06) scaleX(1.01);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) scaleY(1) scaleX(1);
        filter: blur(0);
      }
    }

    @keyframes flotarPergamino {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(6px);
      }
    }

    @keyframes brilloSuave {
      0%, 100% {
        box-shadow:
          0 10px 22px rgba(0, 0, 0, 0.28),
          0 0 10px rgba(255, 220, 140, 0.12);
      }
      50% {
        box-shadow:
          0 10px 22px rgba(0, 0, 0, 0.28),
          0 0 22px rgba(255, 220, 140, 0.30);
      }
    }

    @keyframes chispaFlota {
      0% {
        opacity: 0;
        transform: translateY(8px) scale(0.5);
      }
      20% {
        opacity: 1;
      }
      70% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: translateY(-18px) scale(1.2);
      }
    }

    @media (max-width: 480px) {
      .app {
        padding-left: max(14px, env(safe-area-inset-left));
        padding-right: max(14px, env(safe-area-inset-right));
        padding-top: max(14px, env(safe-area-inset-top));
        padding-bottom: max(14px, env(safe-area-inset-bottom));
      }

      .boton {
        font-size: 20px;
        padding: 17px 22px;
        top: 79%;
      }

      .mensaje {
        font-size: 15px;
      }

      .cuadro-texto {
        top: 8.5%;
        width: 74%;
        max-width: 300px;
        padding: 11px 12px 10px;
      }

      .cuadro-texto h2 {
        font-size: 15px;
      }

      .cuadro-texto p {
        font-size: 12px;
        min-height: 108px;
      }

      .nota {
        font-size: 34px;
      }

      .palabra-actual {
        font-size: 18px;
      }

      .piedra {
        width: 82px;
        height: 38px;
      }

      .progreso {
        font-size: 13px;
      }

      .accion-btn {
        min-width: 90px;
        font-size: 10px;
        padding: 6px 8px;
      }
    }
  </style>
</head>
<body>

  <div class="app">

    <section id="pantalla1" class="pantalla activa">
      <img src="fondo.jpg" class="fondo1" alt="Bosque encantado">
      <div class="capa-oscura"></div>
      <div id="mensaje" class="mensaje">✨ La aventura comienza...</div>
      <button class="boton" onclick="iniciarJuego()">
        Juguemos un rato...
      </button>
    </section>

    <div id="transicion" class="transicion"></div>

    <section id="pantalla2" class="pantalla">
      <img src="pantalla2.png" class="fondo2" alt="Aventura sonora">

      <div class="cuadro-texto">
        <h2>AVENTURA SONORA</h2>
        <p id="texto-escribiendo"><span class="cursor">|</span></p>
      </div>

      <div class="chispa-pergamino cp1"></div>
      <div class="chispa-pergamino cp2"></div>
      <div class="chispa-pergamino cp3"></div>
      <div class="chispa-pergamino cp4"></div>
      <div class="chispa-pergamino cp5"></div>

      <div class="acciones">
        <button class="accion-btn" onclick="reiniciarAventura()">⭐ Reiniciar</button>
      </div>

      <div class="nota n1">♪</div>
      <div class="nota n2">♫</div>
      <div class="nota n3">♪</div>
      <div class="nota n4">♫</div>
      <div class="nota n5">♪</div>
      <div class="nota n6">♫</div>
      <div class="nota n7">♪</div>

      <button class="piedra p1"  data-id="1" onclick="reproducirAudio('1-leo.wav','Leo', this)"></button>
      <button class="piedra p2"  data-id="2" onclick="reproducirAudio('2-luna.wav','Luna', this)"></button>
      <button class="piedra p3"  data-id="3" onclick="reproducirAudio('3-mapa.wav','mapa', this)"></button>
      <button class="piedra p4"  data-id="4" onclick="reproducirAudio('4-perro.wav','perro', this)"></button>
      <button class="piedra p5"  data-id="5" onclick="reproducirAudio('5-bosque.wav','bosque', this)"></button>
      <button class="piedra p6"  data-id="6" onclick="reproducirAudio('6-puente.wav','puente', this)"></button>
      <button class="piedra p7"  data-id="7" onclick="reproducirAudio('7-mariposa.wav','mariposa', this)"></button>
      <button class="piedra p8"  data-id="8" onclick="reproducirAudio('8-tesoro.wav','tesoro', this)"></button>
      <button class="piedra p9"  data-id="9" onclick="reproducirAudio('9-casa.wav','casa', this)"></button>
      <button class="piedra p10" data-id="10" onclick="reproducirAudio('10-magico.wav','mágico', this)"></button>

      <div id="chispa" class="chispa"></div>
      <div id="palabra-actual" class="palabra-actual"></div>
      <div id="progreso" class="progreso">0 / 10</div>

      <div id="final" class="final">
        <div class="final-card">
          <img src="Imagen.png" class="final-imagen" alt="Felicitaciones">
          <h3>¡Felicitaciones!</h3>
          <p>Pequeño explorador o pequeña exploradora, has completado tu aventura sonora y escuchaste todas las palabras del camino.</p>
          <div class="final-acciones">
            <button onclick="cerrarFinal()">Seguir explorando</button>
            <button onclick="reiniciarAventura()">Jugar otra vez</button>
          </div>
        </div>
      </div>
    </section>

  </div>

  <script>
    let audioContext;
    let musicaIniciada = false;
    let audioActual = null;
    const piedrasTocadas = new Set();

    const textoAventura = "Pequeño explorador o pequeña exploradora, observa las piedras del camino. Cada vez que presiones una piedra, escucharás una palabra. Escucha con mucha atención y escribe la palabra en cada piedra de tu libro para poder avanzar en el camino. Recorre todas las piedras, escribe todas las palabras y completa tu aventura sonora.";

    function crearLuces() {
      const contenedor = document.getElementById("pantalla1");
      const colores = [
        "rgba(255, 230, 120, 0.95)",
        "rgba(180, 255, 150, 0.9)",
        "rgba(255, 255, 210, 0.9)",
        "rgba(160, 255, 220, 0.85)"
      ];

      for (let i = 0; i < 34; i++) {
        const luz = document.createElement("div");
        luz.classList.add("luz");
        const tam = Math.random() * 7 + 4;
        luz.style.width = tam + "px";
        luz.style.height = tam + "px";
        luz.style.left = Math.random() * 100 + "%";
        luz.style.top = Math.random() * 100 + "%";
        luz.style.background = colores[Math.floor(Math.random() * colores.length)];
        luz.style.boxShadow = `0 0 ${Math.random() * 12 + 8}px rgba(255, 230, 120, 0.8)`;
        luz.style.animationDuration = (4 + Math.random() * 5) + "s";
        luz.style.animationDelay = (Math.random() * 6) + "s";
        contenedor.appendChild(luz);
      }
    }

    function crearReverb(context) {
      const rate = context.sampleRate;
      const length = rate * 2;
      const impulse = context.createBuffer(2, length, rate);

      for (let channel = 0; channel < 2; channel++) {
        const data = impulse.getChannelData(channel);
        for (let i = 0; i < length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
        }
      }

      const convolver = context.createConvolver();
      convolver.buffer = impulse;
      return convolver;
    }

    function tocarNota(frecuencia, duracion, tipo = "sine", volumen = 0.08, tiempoInicio = 0) {
      const ahora = audioContext.currentTime + tiempoInicio;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = tipo;
      osc.frequency.setValueAtTime(frecuencia, ahora);

      gain.gain.setValueAtTime(0.0001, ahora);
      gain.gain.exponentialRampToValueAtTime(volumen, ahora + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001, ahora + duracion);

      osc.connect(gain);
      gain.connect(window.reverbEntrada);

      osc.start(ahora);
      osc.stop(ahora + duracion);
    }

    function sonidoEscritura() {
      if (!audioContext) return;

      const ahora = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(1200, ahora);

      gain.gain.setValueAtTime(0.0001, ahora);
      gain.gain.exponentialRampToValueAtTime(0.01, ahora + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ahora + 0.05);

      osc.connect(gain);
      gain.connect(window.reverbEntrada);

      osc.start(ahora);
      osc.stop(ahora + 0.05);
    }

    function sonidoToquePiedra() {
      if (!audioContext) return;

      const ahora = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(740, ahora);
      osc.frequency.exponentialRampToValueAtTime(980, ahora + 0.12);

      gain.gain.setValueAtTime(0.0001, ahora);
      gain.gain.exponentialRampToValueAtTime(0.03, ahora + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ahora + 0.18);

      osc.connect(gain);
      gain.connect(window.reverbEntrada);

      osc.start(ahora);
      osc.stop(ahora + 0.18);
    }

    function sonidoFinal() {
      if (!audioContext) return;
      tocarNota(1046.50, 0.25, "triangle", 0.04, 0);
      tocarNota(1318.51, 0.25, "triangle", 0.04, 0.12);
      tocarNota(1567.98, 0.4, "triangle", 0.05, 0.24);
    }

    function iniciarMusicaBosque() {
      if (musicaIniciada) return;

      audioContext = new (window.AudioContext || window.webkitAudioContext)();

      const masterGain = audioContext.createGain();
      masterGain.gain.value = 0.45;

      const reverb = crearReverb(audioContext);
      const reverbGain = audioContext.createGain();
      reverbGain.gain.value = 0.35;

      window.reverbEntrada = audioContext.createGain();
      window.reverbEntrada.connect(masterGain);
      window.reverbEntrada.connect(reverb);
      reverb.connect(reverbGain);
      reverbGain.connect(masterGain);
      masterGain.connect(audioContext.destination);

      const melodia = [
        523.25, 659.25, 783.99, 1046.50,
        987.77, 783.99, 659.25, 587.33,
        659.25, 783.99, 880.00, 783.99,
        698.46, 659.25, 587.33, 523.25
      ];

      const campanas = [
        1046.50, 1318.51, 1174.66, 1567.98,
        1318.51, 1174.66, 1046.50, 987.77
      ];

      let i = 0;
      let j = 0;

      setInterval(() => {
        tocarNota(melodia[i], 0.9, "sine", 0.05);
        tocarNota(melodia[i] * 2, 0.5, "triangle", 0.02, 0.08);
        i = (i + 1) % melodia.length;
      }, 850);

      setInterval(() => {
        tocarNota(campanas[j], 1.8, "triangle", 0.025);
        j = (j + 1) % campanas.length;
      }, 2400);

      setInterval(() => {
        const notasMagicas = [1567.98, 1318.51, 1174.66, 1046.50];
        const nota = notasMagicas[Math.floor(Math.random() * notasMagicas.length)];
        tocarNota(nota, 1.5, "sine", 0.015);
      }, 1700);

      musicaIniciada = true;
    }

    function escribirTextoAnimado() {
      const elemento = document.getElementById("texto-escribiendo");
      elemento.innerHTML = '<span class="cursor">|</span>';

      let i = 0;

      function escribir() {
        if (i < textoAventura.length) {
          elemento.innerHTML = textoAventura.slice(0, i + 1) + '<span class="cursor">|</span>';
          if (i % 2 === 0) sonidoEscritura();
          i++;
          setTimeout(escribir, 22);
        } else {
          elemento.innerHTML = textoAventura;
        }
      }

      escribir();
    }

    function mostrarPalabra(texto) {
      const caja = document.getElementById("palabra-actual");
      caja.textContent = texto;
      caja.classList.add("visible");

      clearTimeout(caja._timeout);
      caja._timeout = setTimeout(() => {
        caja.classList.remove("visible");
      }, 1800);
    }

    function actualizarProgreso() {
      const progreso = document.getElementById("progreso");
      progreso.textContent = `${piedrasTocadas.size} / 10`;

      if (piedrasTocadas.size === 10) {
        setTimeout(() => {
          document.getElementById("final").classList.add("visible");
          sonidoFinal();
        }, 500);
      }
    }

    function lanzarChispa(boton) {
      const chispa = document.getElementById("chispa");
      const pantalla2 = document.getElementById("pantalla2");
      const rectPantalla = pantalla2.getBoundingClientRect();
      const rectBoton = boton.getBoundingClientRect();

      const x = rectBoton.left - rectPantalla.left + rectBoton.width / 2;
      const y = rectBoton.top - rectPantalla.top + rectBoton.height / 2;

      chispa.style.left = x + "px";
      chispa.style.top = y + "px";
      chispa.classList.remove("activa");
      void chispa.offsetWidth;
      chispa.classList.add("activa");
    }

    function reproducirAudio(archivo, palabra, boton) {
      sonidoToquePiedra();
      mostrarPalabra(palabra);
      lanzarChispa(boton);

      document.querySelectorAll(".piedra").forEach(p => p.classList.remove("activa"));
      boton.classList.add("activa");
      setTimeout(() => boton.classList.remove("activa"), 900);

      const id = boton.dataset.id;
      piedrasTocadas.add(id);
      boton.classList.add("tocada");
      actualizarProgreso();

      if (audioActual) {
        audioActual.pause();
        audioActual.currentTime = 0;
      }

      audioActual = new Audio(archivo);
      audioActual.play().catch(error => {
        console.log("No se pudo reproducir el audio:", error);
      });
    }

    function cerrarFinal() {
      document.getElementById("final").classList.remove("visible");
    }

    function reiniciarAventura() {
      piedrasTocadas.clear();
      document.querySelectorAll(".piedra").forEach(p => {
        p.classList.remove("tocada");
        p.classList.remove("activa");
      });

      if (audioActual) {
        audioActual.pause();
        audioActual.currentTime = 0;
      }

      document.getElementById("final").classList.remove("visible");
      document.getElementById("palabra-actual").classList.remove("visible");
      actualizarProgreso();
      escribirTextoAnimado();
    }

    function iniciarJuego() {
      iniciarMusicaBosque();

      const mensaje = document.getElementById("mensaje");
      const pantalla1 = document.getElementById("pantalla1");
      const pantalla2 = document.getElementById("pantalla2");
      const transicion = document.getElementById("transicion");

      mensaje.classList.add("visible");
      transicion.classList.add("activa");

      setTimeout(() => {
        pantalla1.classList.remove("activa");
        pantalla2.classList.add("activa");
        escribirTextoAnimado();
      }, 900);

      setTimeout(() => {
        transicion.classList.remove("activa");
      }, 1900);
    }

    crearLuces();
    actualizarProgreso();
  </script>

</body>
